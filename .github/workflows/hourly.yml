name: Hourly Content Matrix

on:
  workflow_dispatch: # 允許你喺 GitHub 網頁上手動點擊 Run
  repository_dispatch:
    types: [external_trigger] # 🚀 新增：允許你用外部 API (例如 Cloudflare Workers) 一鍵炸過來觸發

permissions:
  contents: read  # 只需要讀取程式碼，安全又省時！

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1 # 深度設為 1 跑得更快！

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Generate Content Matrix & Inject to D1
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
          REPO_INDEX: 0
        run: python generator.py
