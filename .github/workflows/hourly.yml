name: Hourly Content Matrix

on:
  workflow_dispatch: 
  # 如果你想佢每小時自動行一次，可以解鎖下面呢兩行 cron
  # schedule:
  #   - cron: '0 * * * *'

permissions:
  contents: read  # 依家只需要讀取程式碼，唔使再浪費時間寫入 Repo 喇！

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1 # 唔使再撈成個 Git 歷史，深度設為 1 跑得更快！

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Generate Content Matrix & Inject to D1
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}   # 💡 核心：必須注入呢個，Python 先有權限寫入 D1！
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} # 🔑 新增：話畀 Python 聽你個 Cloudflare 帳戶 ID 係咩
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }} # 🔑 新增：話畀 Python 聽要射落去邊個 D1 資料庫
          REPO_INDEX: 0
        run: python generator.py
