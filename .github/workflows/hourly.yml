name: Hourly Content Matrix

on:
  workflow_dispatch: 

# 加入環境變量，解決日誌入面的 Deprecation Warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Generate Content Matrix
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPO_INDEX: 0
        run: python generator.py

      - name: Commit and Push Matrix Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 加入生成的 JSON 檔案
          git add matrix_articles.json
          
          # 2. 檢查是否有檔案變動，有才 commit
          if git diff --staged --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Update viral news matrix: 600 articles generated via API"
            
            # 3. 先 pull 一下確保冇 conflict，然後再 push
            git pull --rebase origin main
            git push origin main
          fi
