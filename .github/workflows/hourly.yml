name: Hourly Content Matrix

on:
  workflow_dispatch: 

permissions:
  contents: write  # 賦予寫入權限，等佢可以 push 檔案

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Generate Content Matrix
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPO_INDEX: 0
        run: python generator.py

      - name: Commit and Push Matrix Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 核心修改：使用 -A 追蹤資料夾內的所有新增（Add）與過期刪除（Delete）
          git add -A content/posts/
          
          if git diff --staged --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Update viral news matrix: sync articles and clean expired posts"
            git pull --rebase origin main
            git push origin main
          fi
