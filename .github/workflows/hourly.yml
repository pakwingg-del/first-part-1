name: Hourly Content Matrix

on:
  # 刪除 schedule，全面改用 API 觸發
  workflow_dispatch: 

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Generate Content Matrix
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPO_INDEX: 0
        run: python generator.py

      - name: Commit and Push Matrix Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 確保呢度 add 嘅檔名同 generator.py 輸出一致
          git add matrix_articles.json
          git commit -m "Update viral news matrix: 600 articles generated via API" || exit 0
          git push
