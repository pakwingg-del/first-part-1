name: Hourly Content Matrix

on:
  schedule:
    - cron: '37 0-7,12-23 * * *' # 備用排程
  workflow_dispatch: # 呢行係比 Cron-job.org Call 入嚟嘅門口

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Generate Content Matrix
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPO_INDEX: 0 # 你原本留低嘅註解，保持不變
        run: python generator.py

      - name: Commit and Push Matrix Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 關鍵修正：add 我哋 generator.py 產生嘅 json 檔
          git add matrix_articles.json
          git commit -m "Update viral news matrix: 600 articles generated" || exit 0
          git push
