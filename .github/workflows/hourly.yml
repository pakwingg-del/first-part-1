name: US Market Content Generator (3 times daily)

on:
  schedule:
    - cron: '3 1 * * *'    # UTC 01:05 → HKT 09:05
    - cron: '3 6 * * *'    # UTC 06:05 → HKT 14:05
    - cron: '3 12 * * *'   # UTC 12:05 → HKT 20:05
  workflow_dispatch:
  repository_dispatch:
    types: [external_trigger]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests openai

      - name: Generate Content + Inject D1 + Sitemap
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
        run: python generator.py

      - name: Commit Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Update sitemap.xml"
          file_pattern: public/sitemap.xml
