name: US Market Content Generator (3 times daily)

on:
  schedule:
    - cron: '5 1 * * *'    # UTC 01:05
    - cron: '5 6 * * *'    # UTC 06:05
    - cron: '5 12 * * *'   # UTC 12:05
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests openai google-auth google-api-python-client

      - name: Generate Content + D1 + Sitemap
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
        run: python generator.py

      - name: Submit to Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_1: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_1 }}
          GOOGLE_SERVICE_ACCOUNT_2: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_2 }}
          GOOGLE_SERVICE_ACCOUNT_3: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_3 }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
        run: python submit_indexing.py

      - name: Commit Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Update sitemap + indexing"
          file_pattern: public/sitemap.xml
