baseURL = 'https://my-viral-news0.pages.dev/'
languageCode = 'en-us'
title = 'VNN | Viral News Network' # SEO 優化：加上縮寫，更專業
theme = "FixIt"

# 全域分頁設定 (控制 /posts/ 頁面)
paginate = 15

[params]
    env = "production"
    defaultTheme = "dark" # 強制深色底，視覺衝擊力強
    
    # 【SEO 優化】網站預設描述
    description = "24/7 Live Global Trending News Network. Your essential source for viral content, exclusive insights, and breaking stories."
    
    # Header 設定
    [params.header]
        fixed = true
        [params.header.title]
            name = "VIRAL NEWS NETWORK"
            logo = ""                     
            pre = ""                      
            post = ""                     

    # FixIt 專用首頁 Profile 設定
    [params.home.profile]
        enable = true
        title = "VIRAL NEWS NETWORK" 
        subtitle = "Global Trending Data Matrix"
        typeit = true
        social = true

    # 【關鍵修正】強制首頁顯示 15 篇，達成 3x5 網格
    [params.home.posts]
        enable = true
        paginate = 15

    # SEO 強化設定
    [params.seo]
        image = "/images/default-viral-cover.png"
        thumbnail = "/images/default-viral-cover.png"
        schema = true

    # 文章列表佈局設定
    [params.section]
        layout = "compact"
        enableWidget = false # 關閉側邊欄，專注在網格標題上
        enableWidgetMobile = false

    # Footer 設定
    [params.footer]
        enable = true
        copyright = true
        since = 2026

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "Trending Now" 
        url = "/posts/"
        weight = 10

# 確保路徑正確
[content]
    [content.posts]
        path = "content/posts"

# 永久連結優化：Google 爬蟲最鍾意嘅日期結構
[permalinks]
    posts = "/:year/:month/:day/:contentbasename/"

[build]
    writeStats = true
    [build.buildStats]
        enableRepoInfo = true

# 強制要求 Hugo 版本
[module]
  [module.hugoVersion]
    extended = true
    min = "0.158.0"