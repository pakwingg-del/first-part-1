baseURL = 'https://my-viral-news0.pages.dev/'
languageCode = 'en-us'
title = 'VNN | Viral News Network' # SEO 優化：加上縮寫，更專業
theme = "FixIt"

# 每頁顯示 10 篇 (保留你的設定，過大會影響載入速度)
paginate = 10

[params]
    env = "production"
    defaultTheme = "dark" # 強制深色底，視覺衝擊力強
    
    # 【SEO 優化】網站預設描述：更權威、更具資訊量
    description = "24/7 Live Global Trending News Network. Your essential source for viral content, exclusive insights, and breaking stories."
    
    # Header 設定 (保留你之前的修正)
    [params.header]
        fixed = true
        [params.header.title]
            name = "🔥 Viral News Network" 
            logo = ""                     
            pre = ""                      
            post = ""                     

    # FixIt 專用首頁設定 (保留 TypeIt，改為 PRO 風格描述)
    [params.home.profile]
        enable = true
        title = "Live Trends Center" # 改為更有權威感的標題
        subtitle = "Get your hourly dose of globally validated viral content here." # 改為專業描述
        typeit = true
        social = true

    # SEO 強化設定 (萬金油封面圖：PNG/JPG 皆可，確保圖片存在)
    [params.seo]
        image = "/images/default-viral-cover.png"
        thumbnail = "/images/default-viral-cover.png"
        schema = true

    # 文章列表佈局設定 (極致簡約化，關閉 widget)
    [params.section]
        layout = "compact"
        enableWidget = false # 關閉側邊欄 widget，專注在文章標題上
        enableWidgetMobile = false

    # Footer 設定 (Optional: 加入版權聲明，增加合法感)
    [params.footer]
        enable = true
        copyright = true
        since = 2026

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "Trending Now" # 改為更緊急的名稱
        url = "/posts/"
        weight = 10

# 確保路徑正確
[content]
    [content.posts]
        path = "content/posts"

# 永久連結優化：保留日期結構，Google 爬蟲非常鍾意
[permalinks]
    posts = "/:year/:month/:day/:contentbasename/"

[build]
    writeStats = true
    [build.buildStats]
        enableRepoInfo = true

# 強制要求 Hugo 版本
[module]
  [module.hugoVersion]
    extended = true
    min = "0.158.0"